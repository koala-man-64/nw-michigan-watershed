name: NWMIWS Admin Web Validation

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/admin-web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "apps/admin-web/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"

jobs:
  validate_admin_web:
    runs-on: ubuntu-latest
    name: Validate Admin Web
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint Admin Web
        run: npm run lint --workspace @nwmiws/admin-web

      - name: Test Admin Web
        run: npm run test --workspace @nwmiws/admin-web

      - name: Build Admin Web
        run: npm run build --workspace @nwmiws/admin-web
