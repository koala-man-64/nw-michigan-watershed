name: NWMIWS Prod Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: swa-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            api/package-lock.json

      - name: Install dependencies for Client
        working-directory: ./client
        run: npm ci

      - name: Install dependencies for API
        working-directory: ./api
        run: npm ci

      - name: Lint Client
        working-directory: ./client
        run: npm run lint

      - name: Lint API
        working-directory: ./api
        run: npm run lint

      - name: Test Client
        working-directory: ./client
        run: npm test -- --watchAll=false

      - name: Test API
        working-directory: ./api
        run: npm test

      - name: Build Client App
        working-directory: ./client
        env:
          REACT_APP_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.REACT_APP_APPLICATIONINSIGHTS_CONNECTION_STRING_PROD }}
        run: npm run build
        
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NWMIWS_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "client/build"
          api_location: "api"
          output_location: ""
          skip_app_build: true
          ###### End of Repository/Build Configurations ######
