name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          submodules: true
          lfs: false

      # Note: runtime secrets for the API (e.g., SQL_CONNECTION_STRING, STORAGE_ACCOUNT_URL)
      # must be configured in Azure Static Web Apps configuration, not exported here.

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: |
            api/requirements.txt
            api/requirements-dev.txt

      - name: Enforce Repo Hygiene
        run: |
          tracked="$(git ls-files 'client/build/**' 'client/nginx/**' 'client/Dockerfile' 'api/local.settings.json')"
          if [ -n "$tracked" ]; then
            echo "Tracked protected artifacts found:"
            echo "$tracked"
            exit 1
          fi

      - name: Secret Scan (Advisory Until History Rewrite)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies for API
        run: python3 -m pip install -r api/requirements.txt -r api/requirements-dev.txt

      - name: Install dependencies for Client
        working-directory: ./client
        run: npm ci

      - name: Validate API Bytecode
        run: python3 -m py_compile api/*.py

      - name: Run API Test Suite
        run: |
          mkdir -p artifacts
          python3 -m pytest api/tests -q --maxfail=1 --cov=api --cov-report=term-missing --cov-report=xml:artifacts/api-coverage.xml

      - name: Validate SWA Config JSON
        run: python3 -m json.tool client/public/staticwebapp.config.json > /dev/null

      - name: Lint Client App
        working-directory: ./client
        run: npm run lint

      - name: Test Client App
        working-directory: ./client
        run: npm run test:ci

      - name: Audit Client Dependencies (Advisory)
        working-directory: ./client
        run: |
          mkdir -p ../artifacts
          if npm audit --omit=dev --json > ../artifacts/npm-audit.json; then
            audit_exit=0
          else
            audit_exit=$?
          fi
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary = [
              "## Client dependency audit",
              "",
          ]
          path = Path("../artifacts/npm-audit.json")
          if path.exists() and path.stat().st_size > 0:
              try:
                  report = json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  summary.append(f"- unable to parse npm audit output: {exc}")
              else:
                  vulns = report.get("metadata", {}).get("vulnerabilities", {})
                  summary.extend(
                      [
                          f"- total: {vulns.get('total', 'unknown')}",
                          f"- critical: {vulns.get('critical', 0)}",
                          f"- high: {vulns.get('high', 0)}",
                          f"- moderate: {vulns.get('moderate', 0)}",
                          f"- low: {vulns.get('low', 0)}",
                      ]
                  )
          else:
              summary.append("- npm audit did not produce JSON output")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("\n".join(summary) + "\n")
          PY
          echo "npm audit exit code: $audit_exit"

      - name: Run Drift Audit (Advisory)
        continue-on-error: true
        run: python3 .codex/skills/code-drift-sentinel/scripts/codedrift_sentinel.py --mode audit --repo .

      - name: Upload Drift Audit Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: drift-audit-prod
          path: |
            artifacts/drift_report.md
            artifacts/drift_report.json
          if-no-files-found: ignore

      - name: Upload Client Audit Artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: client-audit-prod
          path: artifacts/npm-audit.json
          if-no-files-found: ignore

      - name: Build Client App
        working-directory: ./client
        run: npm run build

      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-prod
          path: |
            artifacts/api-coverage.xml
            client/coverage/coverage-summary.json
            client/coverage/lcov.info
          if-no-files-found: ignore

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_COAST_0A9902A1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          app_location: "client"
          api_location: "api"
          output_location: "build"
          ###### End of Repository/Build Configurations ######
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_AMBITIOUS_COAST_0A9902A1E }}
          action: "close"
          app_location: "client"  # Added required parameter
