name: NWMIWS Sbx Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - sbx
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - sbx

concurrency:
  group: swa-sbx-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: |
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/sbx') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/sbx') ||
      (github.event_name == 'pull_request' && github.base_ref == 'sbx' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint Portal Web
        run: npm run lint --workspace @nwmiws/portal-web

      - name: Lint Platform API
        run: npm run lint --workspace nwmiws-platform-api

      - name: Test Portal Web
        run: npm run test --workspace @nwmiws/portal-web

      - name: Test Platform API
        run: npm run test --workspace nwmiws-platform-api

      - name: Build Portal Web
        env:
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.REACT_APP_APPLICATIONINSIGHTS_CONNECTION_STRING_SBX }}
        run: npm run build --workspace @nwmiws/portal-web

      - name: Build Platform API
        run: npm run build --workspace nwmiws-platform-api

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NWMIWS_SBX }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations ######
          app_location: "apps/portal-web/dist"
          api_location: "apps/platform-api"
          output_location: ""
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.base_ref == 'sbx' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      pull-requests: write
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NWMIWS_SBX }}
          action: "close"
          app_location: "apps/portal-web"
